name: 🌻 Sunflower Land Daily Digest

on:
  schedule:
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:
    inputs:
      hours_override:
        description: 'Fenêtre de temps en heures (ex: 48 pour tester)'
        required: false
        default: '8'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      models: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DIGEST_MODEL: gpt-4o

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install requests --quiet

      - name: SFL digest
        env:
          DIGEST_WINDOW_HOURS: ${{ github.event.inputs.hours_override || '8' }}
        run: python3 scripts/sfl_digest.py

      - name: GitHub stars digest
        env:
          STARS_GH_TOKEN: ${{ secrets.STARS_GH_TOKEN }}
          STARS_WINDOW_HOURS: ${{ github.event.inputs.hours_override || '8' }}
        run: python3 scripts/stars_digest.py
