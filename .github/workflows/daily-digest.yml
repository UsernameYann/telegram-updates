name: 🌻 Sunflower Land Daily Digest

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      hours_override:
        description: 'Fenêtre de temps en heures (ex: 48 pour tester)'
        required: false
        default: '24'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      models: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DIGEST_MODEL: gpt-4o

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install requests --quiet

      - name: SFL digest
        env:
          DIGEST_WINDOW_HOURS: ${{ github.event.inputs.hours_override || '24' }}
        run: python3 scripts/sfl_digest.py

      - name: GitHub stars digest
        env:
          STARS_GH_TOKEN: ${{ secrets.STARS_GH_TOKEN }}
          STARS_WINDOW_HOURS: ${{ github.event.inputs.hours_override || '24' }}
        run: python3 scripts/stars_digest.py

      - name: Restore release digest state
        uses: actions/cache@v4
        with:
          path: data/sfl_release_seen.json
          key: sfl-release-state-${{ github.run_id }}
          restore-keys: sfl-release-state-

      - name: SFL release digest
        env:
          SFL_RELEASE_WINDOW_HOURS: ${{ github.event.inputs.hours_override || '24' }}
        run: python3 scripts/sfl_release_digest.py
